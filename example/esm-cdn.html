<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>react-msaview ESM CDN Example</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
      }
      #root {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!--
      This example uses esm.sh to load react-msaview and its dependencies.
      Note: This may take a moment to load as esm.sh builds the modules on-demand.
      For production, consider using a bundler like Vite, webpack, or esbuild.
    -->
    <script type="module">
      // Import everything from esm.sh with bundled dependencies
      import React from 'https://esm.sh/react@19'
      import { createRoot } from 'https://esm.sh/react-dom@19/client'

      // react-msaview with all dependencies bundled
      // The ?bundle flag tells esm.sh to bundle all dependencies
      const { MSAView, MSAModelF } = await import(
        'https://esm.sh/react-msaview@5?bundle'
      )

      // Example FASTA data (serum albumin sequences)
      const fastaData = `>Human_ALB
MKWVTFISLLFLFSSAYSRGVFRRDAHKSEVAHRFKDLGEENFKALVLIAFAQYLQQCPF
EDHVKLVNEVTEFAKTCVADESAENCDKSLHTLFGDKLCTVATLRETYGEMADCCAKQEP
ERNECFLQHKDDNPNLPRLVRPEVDVMCTAFHDNEETFLKKYLYEIARRHPYFYAPELLF
>Bovine_ALB
MKWVTFISLLFLFSSAYSRGVFRRDTHKSEIAHRFKDLGEQYFKGLVLIAFSQYLQQCPF
DEHVKLVNELTEFAKTCVADESAENCDKSIHTLFGDKLCAIPNLRENYGELADCCTKQEP
ERNECFLQHKDDNPSLPPFERPEAEAMCTSFKENPTTFMGHYLHEVARRHPYFYAPELLY
>Pig_ALB
MKWVTFISLLLLFSSAYSRGVFRRDTHKSEIAHRFNDLGEEHFKGLVLIAFSQYLQQCPF
DEHVKLVNELTEFAKTCVADESHAGCEKSLHTLFGDELCKVASLRETYGDMADCCEKQEP
ERNECFLSHKDDSPDLPKLKPDPNTLCDEFKADEKKFWGKYLYEIARRHPYFYAPELLYY`

      // Create the MST model
      const model = MSAModelF().create()

      // Set the width based on window size
      model.setWidth(window.innerWidth)

      // Load the FASTA data
      model.setMSA({ msa: fastaData, msaFilehandle: { uri: 'example.fa' } })

      // Render the app
      const root = createRoot(document.getElementById('root'))
      root.render(React.createElement(MSAView, { model }))

      // Handle window resize
      window.addEventListener('resize', () => {
        model.setWidth(window.innerWidth)
      })
    </script>
  </body>
</html>
