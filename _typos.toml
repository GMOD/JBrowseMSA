
[files]
extend-exclude = [
  "packages/r-msaview/inst/htmlwidgets/lib/",
  # phylogenetic trees + the demo config are full of UCSC species db ids
  # (panTro4, HLturTru4, ...) that the spell checker reads as typos
  "*.nh",
  "packages/app/public/data/jbrowse-msa-combined-config.json",
]

[default.extend-words]
BLOSUM = "BLOSUM"
# synteny term: conserved gene order across genomes (not geometric "collinear")
colinear = "colinear"
Pase = "Pase"
# UCSC species db names in comments, e.g. panTro4 (chimp)
Tro = "Tro"
# prose abbreviations the checker mis-reads (IIFEs, PNGs, ALS the disease)
IIF = "IIF"
PN = "PN"
ALS = "ALS"
