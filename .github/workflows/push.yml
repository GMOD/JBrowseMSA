name: Push

on: push

jobs:
  test:
    name: Test and typecheck on node 20.x and ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Build svgcanvas
        run: pnpm --filter @jbrowse/svgcanvas build
      - name: Build parsers
        run: pnpm --filter msa-parsers build
      - name: Build lib
        run: pnpm --filter react-msaview build:esm
      - name: tsc app
        run: pnpm --filter app exec tsc
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test
  spellcheck:
    name: Spell check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check spelling
        uses: crate-ci/typos@master
